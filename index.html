<body class="bg-slate-950 text-slate-100">
  <div id="app" class="h-full flex flex-col"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
  const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick, inject, provide } = Vue;

  // ── Storage helpers ──────────────────────────────────────────
  const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
  const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

  // ── Chapter metadata ─────────────────────────────────────────
  const CHAPTERS_DEF = {
    exam: [
      { num: 1, name: '民用航空法及相關法規', short: '法規', total: 146 },
      { num: 2, name: '飛航安全及飛行原理',   short: '飛行原理', total: 234 },
      { num: 3, name: '氣象學',               short: '氣象', total: 129 },
      { num: 4, name: '人為因素及飛行決策',   short: '人為因素', total: 79 },
    ],
    normal: [
      { num: 1, name: '民用航空法及相關法規', short: '法規', total: 91 },
      { num: 2, name: '基礎飛行原理',         short: '飛行原理', total: 172 },
      { num: 3, name: '氣象',                 short: '氣象', total: 82 },
      { num: 4, name: '緊急處置與飛行決策',   short: '飛行決策', total: 43 },
    ],
  };

  // ── Questions cache & loader ──────────────────────────────────
  const qCache = {};
  async function loadChapters(nums, mode = 'exam') {
    const prefix = mode === 'normal' ? 'n' : 'e';
    const filePrefix = mode === 'normal' ? 'normal' : 'exam';
    await Promise.all(nums.filter(n => !qCache[`${prefix}_${n}`]).map(async n => {
      const r = await fetch(`${filePrefix}_ch${n}.json`);
      if (!r.ok) throw new Error(`${filePrefix}_ch${n}.json 載入失敗 (HTTP ${r.status})`);
      const d = await r.json();
      qCache[`${prefix}_${n}`] = d.map(q => ({ ...q, gid: `${prefix}_${q.chapter}_${q.id}` }));
    }));
    return nums.flatMap(n => qCache[`${prefix}_${n}`] || []);
  }
  function shuffle(a) {
    const b = [...a];
    for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; }
    return b;
  }
  function normalizeText(s) { return String(s || '').toLowerCase().trim(); }
  function tokenize(text) {
    const src = normalizeText(text);
    const cjk = src.match(/[\u4e00-\u9fff]{2,}/g) || [];
    const latin = src.match(/[a-z]{2,}/g) || [];
    return [...cjk, ...latin];
  }

  // ── useProgress ───────────────────────────────────────────────
  function useProgress(mode) {
    const progKey = () => mode.value === 'normal' ? 'dq_progress_n' : 'dq_progress';
    const wrongKey = () => mode.value === 'normal' ? 'dq_wrong_n' : 'dq_wrong';
    const prefix = () => mode.value === 'normal' ? 'n' : 'e';
    const prog = ref(load(progKey(), {}));
    const wrong = ref(load(wrongKey(), []));
    watch(mode, m => {
      prog.value = load(m === 'normal' ? 'dq_progress_n' : 'dq_progress', {});
      wrong.value = load(m === 'normal' ? 'dq_wrong_n' : 'dq_wrong', []);
    });
    function record(gid, sel, ans) {
      const e = prog.value[gid] || { attempts: 0, correct: 0 };
      const ok = sel === ans;
      prog.value[gid] = { attempts: e.attempts + 1, correct: e.correct + (ok ? 1 : 0), last: sel, ok, at: Date.now() };
      save(progKey(), prog.value);
      if (!ok && !wrong.value.includes(gid)) { wrong.value.push(gid); save(wrongKey(), wrong.value); }
    }
    function chStat(n) {
      const pfx = prefix();
      const chapters = CHAPTERS_DEF[mode.value];
      const es = Object.entries(prog.value).filter(([k]) => k.startsWith(`${pfx}_${n}_`));
      const t = es.length, c = es.filter(([, v]) => v.ok).length;
      return { t, c, pct: t > 0 ? Math.round(c / t * 100) : 0, cov: Math.round(t / (chapters[n-1]?.total || 1) * 100) };
    }
    function clearAll() { prog.value = {}; wrong.value = []; save(progKey(), {}); save(wrongKey(), []); }
    return { prog, wrong, record, chStat, clearAll };
  }

  // ── useSessions ───────────────────────────────────────────────
  function useSessions(mode) {
    const sessKey = () => mode.value === 'normal' ? 'dq_sessions_n' : 'dq_sessions';
    const sessions = ref(load(sessKey(), []));
    watch(mode, m => { sessions.value = load(m === 'normal' ? 'dq_sessions_n' : 'dq_sessions', []); });
    function addSession(s) {
      sessions.value.unshift(s);
      if (sessions.value.length > 50) sessions.value.length = 50;
      save(sessKey(), sessions.value);
    }
    function clearAll() { sessions.value = []; save(sessKey(), []); }
    return { sessions, addSession, clearAll };
  }

  // ── useSettings ───────────────────────────────────────────────
  function useSettings() {
    const defaults = { exam_min: 60, exam_count: 60, show_exp: true };
    const cfg = ref(load('dq_settings', defaults));
    function persist() { save('dq_settings', cfg.value); }
    return { cfg, persist };
  }

  // ── useSeqPos ─────────────────────────────────────────────────
  function useSeqPos(modeOrRef) {
    function key() {
      const m = modeOrRef?.value ?? modeOrRef;
      return m === 'normal' ? 'dq_seq_pos_n' : 'dq_seq_pos';
    }
    function ck(chs) { return Array.isArray(chs) ? chs.join(',') : String(chs); }
    function isValidPos(p) { return p && typeof p.idx === 'number' && typeof p.total === 'number'; }
    function getPos(chs) { const p = load(key())?.[ck(chs)] ?? null; return isValidPos(p) ? p : null; }
    function setPos(chs, idx, total) {
      const d = load(key()) || {};
      d[ck(chs)] = { idx, total, at: Date.now() };
      save(key(), d);
    }
    function clearPos(chs) {
      const d = load(key()) || {};
      delete d[ck(chs)];
      save(key(), d);
    }
    function allPos() {
      const d = load(key()) || {};
      const cleaned = {}; let dirty = false;
      Object.entries(d).forEach(([k, v]) => { if (isValidPos(v)) cleaned[k] = v; else dirty = true; });
      if (dirty) save(key(), cleaned);
      return cleaned;
    }
    function clearAllPos() { save(key(), {}); }
    return { getPos, setPos, clearPos, allPos, clearAllPos };
  }

  // ── migrateProgressIfNeeded ──────────────────────────────────
  function migrateProgressIfNeeded() {
    if (load('dq_migrated_v2', false)) return;
    const prog = load('dq_progress', {});
    const wrong = load('dq_wrong', []);
    const newProg = {};
    Object.entries(prog).forEach(([k, v]) => { newProg[`e_${k}`] = v; });
    const newWrong = wrong.map(gid => `e_${gid}`);
    save('dq_progress', newProg);
    save('dq_wrong', newWrong);
    save('dq_migrated_v2', true);
  }

  // ── useTimer ──────────────────────────────────────────────────
  function useTimer() {
    const rem = ref(0); const active = ref(false); let tid = null;
    const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    const display = computed(() => fmt(rem.value));
    const warn = computed(() => rem.value <= 300 ? 'crit' : rem.value <= 600 ? 'warn' : 'ok');
    function start(sec, onDone) {
      rem.value = sec; active.value = true;
      tid = setInterval(() => { if (--rem.value <= 0) { stop(); onDone(); } }, 1000);
    }
    function stop() { clearInterval(tid); tid = null; active.value = false; }
    return { rem, active, display, warn, start, stop };
  }

  // ════════════════════════════════════════════════════════════════
  // VIEW: HomeView
  // ════════════════════════════════════════════════════════════════
  const HomeView = {
    props: ['prog','wrong','nav'],
    setup(p) {
      const mode = inject('mode');
      const setMode = inject('setMode');
      const chapters = inject('chapters');
      const toastMsg = ref('');
      let toastTimer = null;

      function switchMode(m) {
        if (mode.value === m) return;
        setMode(m);
        const label = m === 'normal' ? '普通操作證' : '專業操作證';
        toastMsg.value = `已切換至${label}，進度各自獨立保存`;
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toastMsg.value = ''; }, 2500);
      }

      const isNormal = computed(() => mode.value === 'normal');
      const overall = computed(() => {
        const vals = Object.values(p.prog);
        const t = vals.length, c = vals.filter(v => v.ok).length;
        return { t, c, pct: t ? Math.round(c / t * 100) : 0 };
      });
      const seqPos = useSeqPos(mode);
      const seqPosData = computed(() => seqPos.allPos());
      const chs = computed(() => chapters.value.map(ch => {
        const pfx = mode.value === 'normal' ? 'n' : 'e';
        const es = Object.entries(p.prog).filter(([k]) => k.startsWith(`${pfx}_${ch.num}_`));
        const t = es.length, c = es.filter(([, v]) => v.ok).length;
        const resume = seqPosData.value[String(ch.num)] || null;
        return { ...ch, ans: t, cor: c, pct: t ? Math.round(c / t * 100) : 0, cov: Math.round(t / ch.total * 100), resume };
      }));
      const refreshing = ref(false);
      async function forceRefresh() {
        if (refreshing.value) return;
        refreshing.value = true;
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        window.location.reload();
      }
      return { overall, chs, wc: computed(() => p.wrong.length), mode, isNormal, switchMode, toastMsg, forceRefresh, refreshing };
    },
    template: `
    <div class="flex flex-col h-full">
      <div class="flex-shrink-0 bg-slate-900 border-b border-slate-800 px-4 py-4">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" :class="isNormal?'bg-emerald-600':'bg-blue-600'">🚁</div>
          <div class="flex-1">
            <h1 class="text-lg font-bold">無人機考試練習</h1>
            <p class="text-xs text-slate-400">台灣遙控無人機操作證學科</p>
          </div>
          <button @click="forceRefresh" class="p-1 text-slate-400 hover:text-slate-100" title="重新整理">
            <svg :class="refreshing ? 'animate-spin' : ''" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
        </div>
        <div class="flex bg-slate-800 rounded-xl p-1 gap-1">
          <button @click="switchMode('normal')" :class="isNormal?'bg-emerald-600 text-white shadow-sm':'text-slate-400 hover:text-slate-200'"
            class="flex-1 py-1.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1.5">
            <span>普通操作證</span><span class="text-xs opacity-70 font-normal">388題</span>
          </button>
          <button @click="switchMode('exam')" :class="!isNormal?'bg-blue-600 text-white shadow-sm':'text-slate-400 hover:text-slate-200'"
            class="flex-1 py-1.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-1.5">
            <span>專業操作證</span><span class="text-xs opacity-70 font-normal">588題</span>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div class="px-4 py-4 grid grid-cols-3 gap-3">
          <div class="bg-slate-900 rounded-xl p-3 text-center">
            <div class="text-2xl font-bold" :class="isNormal?'text-emerald-400':'text-blue-400'">{{overall.t}}</div>
            <div class="text-xs text-slate-400 mt-0.5">已作答</div>
          </div>
          <div class="bg-slate-900 rounded-xl p-3 text-center">
            <div class="text-2xl font-bold text-green-400">{{overall.pct}}%</div>
            <div class="text-xs text-slate-400 mt-0.5">正確率</div>
          </div>
          <div class="bg-slate-900 rounded-xl p-3 text-center">
            <div class="text-2xl font-bold text-amber-400">{{wc}}</div>
            <div class="text-xs text-slate-400 mt-0.5">錯題數</div>
          </div>
        </div>
        <div class="px-4 pb-4">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">開始練習</p>
          <div class="space-y-2.5">
            <button @click="nav('setup',{type:'chapter_seq'})" class="w-full bg-slate-900 hover:bg-slate-800 active:scale-[0.98] border border-slate-800 rounded-xl p-4 text-left transition-all">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl" :class="isNormal?'bg-emerald-900/50':'bg-blue-900/50'">📖</div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold">章節循序練習</div>
                  <div class="text-sm text-slate-400">依章節順序作答，答錯顯示說明</div>
                </div>
                <svg class="w-5 h-5 text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
            <button @click="nav('setup',{type:'random'})" class="w-full bg-slate-900 hover:bg-slate-800 active:scale-[0.98] border border-slate-800 rounded-xl p-4 text-left transition-all">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-900/50 rounded-lg flex items-center justify-center text-xl">🎲</div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold">隨機抽題練習</div>
                  <div class="text-sm text-slate-400">隨機出題，測試全面理解</div>
                </div>
                <svg class="w-5 h-5 text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
            <button @click="nav('setup',{type:'timed'})" class="w-full bg-slate-900 hover:bg-slate-800 active:scale-[0.98] border border-slate-800 rounded-xl p-4 text-left transition-all">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-900/50 rounded-lg flex items-center justify-center text-xl">⏱️</div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold">限時模擬考試</div>
                  <div class="text-sm text-slate-400">計時作答，模擬真實考試情境</div>
                </div>
                <svg class="w-5 h-5 text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
            <button @click="wc>0&&nav('setup',{type:'wrong'})" :disabled="wc===0" :class="wc===0?'opacity-40 cursor-not-allowed':'hover:bg-slate-800 active:scale-[0.98]'" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-left transition-all">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-900/50 rounded-lg flex items-center justify-center text-xl">🔁</div>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold">錯題複習</div>
                  <div class="text-sm text-slate-400">{{wc>0?wc+' 題待複習':'目前沒有錯題'}}</div>
                </div>
                <svg class="w-5 h-5 text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
          </div>
        </div>
        <div class="px-4 pb-6">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">章節進度</p>
          <div class="space-y-2">
            <div v-for="ch in chs" :key="ch.num" class="bg-slate-900 rounded-xl p-3">
              <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                  <span class="text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded font-mono">CH{{ch.num}}</span>
                  <span class="text-sm font-medium">{{ch.short}}</span>
                </div>
                <div class="text-sm text-slate-400">
                  <span class="text-slate-200 font-medium">{{ch.ans}}</span>/{{ch.total}}
                  <span v-if="ch.ans>0" class="ml-2 font-semibold" :class="ch.pct>=70?'text-green-400':'text-amber-400'">{{ch.pct}}%</span>
                </div>
              </div>
              <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                  :class="ch.pct>=70?'bg-green-500':ch.ans>0?'bg-amber-500':(isNormal?'bg-emerald-500':'bg-blue-500')"
                  :style="{width:Math.max(ch.cov,ch.ans>0?2:0)+'%'}"></div>
              </div>
              <div v-if="ch.resume" class="mt-2.5 flex items-center justify-between">
                <span class="text-xs text-slate-500">上次做到 {{ch.resume.idx}}/{{ch.resume.total}} 題</span>
                <button
                  @click="nav('quiz',{type:'chapter_seq',chapters:[ch.num],resumeFrom:ch.resume.idx,count:null,timeSec:0,showExp:true,mode:mode.value})"
                  :class="isNormal?'bg-emerald-700 hover:bg-emerald-600':'bg-blue-700 hover:bg-blue-600'"
                  class="text-xs text-white px-3 py-1 rounded-lg font-medium transition-colors">
                  繼續
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- 模擬器入口（目前隱藏，待功能穩定後開放） -->
      <div class="px-4 pb-4" style="display:none" id="sim-entry">
        <a href="game.html" class="flex items-center gap-3 bg-slate-900 border border-slate-700 rounded-xl p-4 text-left hover:bg-slate-800 transition-all active:scale-[0.98]">
          <div class="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center text-xl">🎮</div>
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-slate-200">操控模擬器 <span class="text-xs text-slate-500 font-normal ml-1">Beta</span></div>
            <div class="text-sm text-slate-400">ALIGN M460 · 3D 飛行練習</div>
          </div>
          <svg class="w-5 h-5 text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
      </div>
      <transition name="fade">
        <div v-if="toastMsg" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
          <div class="bg-slate-700 text-slate-100 text-sm px-4 py-2.5 rounded-xl shadow-lg whitespace-nowrap">{{toastMsg}}</div>
        </div>
      </transition>
    </div>`
  };

  // ════════════════════════════════════════════════════════════════
  // VIEW: SetupView
  // ════════════════════════════════════════════════════════════════
  const SetupView = {
    props: ['params','wrong','cfg','nav'],
    setup(p) {
      const mode = inject('mode');
      const chapters = inject('chapters');

      const errMsg = ref('');
      const qs = ref([]);
      const idx = ref(0);
      const ans = ref({});

      const q = computed(() => qs.value[idx.value]);

      const correct = computed(() => q.value?.answer);
      const answered = computed(() => !!sel.value);
      const isOk = computed(() => answered.value && sel.value === correct.value);
      const progress = computed(() => {
        const tot = qs.value.length + resumeFrom;
        return {
          cur: idx.value + 1 + resumeFrom,
          tot,
          donePct: Math.round((resumeFrom + Object.keys(ans.value).length) / Math.max(tot, 1) * 100)
        };
      });

      const qMode = p.params.mode || 'exam';
      const seqPos = useSeqPos(qMode);
      onMounted(async () => {
        try {
          let list;
          if (type === 'wrong') {
            const all = await loadChapters([1,2,3,4], qMode);
            const wset = new Set(p.wrong);
            list = all.filter(q => wset.has(q.gid));
          } else if (type === 'search') {
            const all = await loadChapters([1,2,3,4], qMode);
            const byGid = new Map(all.map(item => [item.gid, item]));
            list = (gids || []).map(gid => byGid.get(gid)).filter(Boolean);
          } else if (type === 'chapter_seq') {
            const full = await loadChapters(chapters, qMode);
            list = resumeFrom > 0 ? full.slice(resumeFrom) : full;
          } else {
            const pool = await loadChapters(chapters, qMode);
            list = shuffle(pool).slice(0, count);
          }
          qs.value = list;
          if (timeSec > 0) timer.start(timeSec, () => finish(true));
          loading.value = false;
        } catch(e) {
          errMsg.value = '載入失敗，請確認在 HTTP 伺服器環境下開啟';
          loading.value = false;
        }

      let autoAdvTimer = null;
      onUnmounted(() => { timer.stop(); if (autoAdvTimer) clearTimeout(autoAdvTimer); });

      function pick(opt) {
        if (answered.value) return;
        ans.value[q.value.gid] = opt;
        p.onRecord(q.value.gid, opt, correct.value);
        if (type === 'chapter_seq') {
          seqPos.setPos(chapters, resumeFrom + idx.value + 1, resumeFrom + qs.value.length);
        }
        if (!showExp) autoAdvTimer = setTimeout(advance, 250);
        else if (opt !== correct.value) navigator.vibrate?.(50);
      }

      function advance() {
        if (idx.value < qs.value.length - 1) idx.value++;

      }

      function back() { if (idx.value > 0) idx.value--; }

      function finish(timeUp) {
        timer.stop();
        if (type === 'chapter_seq') seqPos.clearPos(chapters);
        const total = qs.value.length;
        const score = qs.value.filter(q => ans.value[q.gid] === q.answer).length;
        p.nav('result', { type, chapters, count, questions: qs.value, answers: ans.value, total, score, timeUp,

        if (opt === correct.value) return 'border-green-500 bg-green-900/40 text-green-300 cursor-default';

      }

          chatgpt:    `https://chatgpt.com/?q=${p}`,

        });

  const ResultView = {
    props: ['params','onSave','nav'],
    setup(p) {
      const { type, questions, answers, total, score, timeUp, duration, showExp, source } = p.params;
      const chapters = p.params.chapters;
      const count = p.params.count;
      const qMode = p.params.mode || 'exam';
      onMounted(() => p.onSave({ id:'s'+Date.now(), type, source, total, score, duration, timeUp, at: Date.now() }));
      const pct = computed(() => total>0?Math.round(score/total*100):0);
      const passed = computed(() => pct.value>=70);
      const dur = computed(() => { const m=Math.floor(duration/60),s=duration%60; return m>0?`${m} 分 ${s} 秒`:`${s} 秒`; });
      const byChapter = computed(() => {
        const m = {};
        questions.forEach(q => {
          if (!m[q.chapter]) m[q.chapter] = { total:0, cor:0, name:q.chapter_name };
          m[q.chapter].total++;
          if (answers[q.gid]===q.answer) m[q.chapter].cor++;
        });
        return Object.entries(m).map(([ch,v])=>({ ch:+ch, ...v, pct:Math.round(v.cor/v.total*100) }));
      });
      const wrong = computed(() => questions.filter(q=>answers[q.gid]&&answers[q.gid]!==q.answer));
      const noAns = computed(() => questions.filter(q=>!answers[q.gid]).length);
      const retryGids = computed(() => questions.map(q => q.gid));
      function retry() {
        if (type === 'search') {
          p.nav('quiz', { type, chapters, count: retryGids.value.length, gids: retryGids.value, timeSec: 0, showExp, source: source || 'search_batch', mode: qMode });
          return;
        }
        p.nav('setup', { type, chapters, count });
      }
      return { pct, passed, dur, byChapter, wrong, noAns, type, showExp, chapters, count, retry };
    },

              <div class="flex justify-between items-center mb-2">

                  <span class="text-xs bg-slate-700 px-1.5 py-0.5 rounded font-mono text-slate-300">CH{{r.ch}}</span>

        if (refreshing.value) return;

        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        window.location.reload();
      }
      return { local, save, forceRefresh, refreshing };

  const SearchView = {
    props: ['cfg','nav'],
    setup(p) {
      const mode = inject('mode');
      const chapters = inject('chapters');
      const searchStateKey = () => mode.value === 'normal' ? 'dq_search_state_n' : 'dq_search_state';
      const loading = ref(true);
      const errMsg = ref('');
      const savedState = load(searchStateKey(), {});
      const query = ref(savedState.query || '');
      const initialCh = Array.isArray(savedState.chapters) ? savedState.chapters.filter(n => [1,2,3,4].includes(n)) : [];
      const selCh = ref(initialCh.length ? initialCh : [1,2,3,4]);
      const idxQs = ref([]);
      const scrollBox = ref(null);
      const initialScrollTop = Number(savedState.scrollTop) || 0;
      const STOP_WORDS = new Set([
        '以及','可以','不得','應該','是否','進行','使用','飛行','無人機','遙控','操作','之','的','與','及','在','或','和','為','於',
        'this','that','with','from','into','must','shall','should','would','could','have','has','had','were','was','when','where'
      ]);

      function saveState(scrollTop = null) {
        save(searchStateKey(), {
          query: query.value,
          chapters: [...selCh.value],
          scrollTop: scrollTop == null ? (scrollBox.value?.scrollTop || 0) : scrollTop
        });
      }
      function onScroll(e) { saveState(e.target.scrollTop); }

      async function buildIndex(m) {
        loading.value = true;
        errMsg.value = '';
        try {
          const all = await loadChapters([1,2,3,4], m);
          idxQs.value = all.map(item => {
            const searchText = normalizeText([
              item.chapter_name,
              item.question,
              item.options?.A,
              item.options?.B,
              item.options?.C,
              item.options?.D,
              item.explanation
            ].filter(Boolean).join(' '));
            const tokens = tokenize(searchText).filter(w => !STOP_WORDS.has(w) && !/^\d+$/.test(w));
            return {
              ...item,
              searchText,
              compactText: searchText.replace(/\s+/g, ''),
              tokens: [...new Set(tokens)]
            };
          });
          loading.value = false;
        } catch (e) {
          errMsg.value = '載入失敗，請確認在 HTTP 伺服器環境下開啟';
          loading.value = false;
        }
      }

      onMounted(async () => {
        await buildIndex(mode.value);
        await nextTick();
        if (scrollBox.value) scrollBox.value.scrollTop = initialScrollTop;
      });
      onUnmounted(() => saveState());
      watch(mode, async m => { query.value = ''; selCh.value = [1,2,3,4]; await buildIndex(m); });
      watch([query, selCh], () => saveState(), { deep: true });

      const pool = computed(() => idxQs.value.filter(item => selCh.value.includes(item.chapter)));
      const normQ = computed(() => normalizeText(query.value));
      const result = computed(() => {
        if (!normQ.value) return [];
        const compactQ = normQ.value.replace(/\s+/g, '');
        return pool.value.filter(item => item.searchText.includes(normQ.value) || (compactQ && item.compactText.includes(compactQ)));
      });
      const hotKeywords = computed(() => {
        const counter = new Map();
        pool.value.forEach(item => item.tokens.forEach(t => counter.set(t, (counter.get(t) || 0) + 1)));
        return [...counter.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-Hant'))
          .slice(0, 24)
          .map(([word, freq]) => ({ word, freq }));
      });
      const resultGids = computed(() => result.value.map(q => q.gid));

      const jumpId = ref('');
      const jumpQuestion = computed(() => {
        const raw = jumpId.value.trim();
        if (!raw) return null;
        const m = raw.match(/^(\d+)[-_](\d+)$/);
        if (!m) return null;
        const ch = parseInt(m[1]), id = parseInt(m[2]);
        return idxQs.value.find(q => q.chapter === ch && q.id === id) ?? null;
      });

      function toggleCh(n) {
        const i = selCh.value.indexOf(n);
        if (i >= 0) { if (selCh.value.length > 1) selCh.value.splice(i, 1); }
        else { selCh.value.push(n); selCh.value.sort((a, b) => a - b); }
      }
      function startPractice() {
        if (resultGids.value.length === 0) return;
        saveState();
        p.nav('quiz', {
          type: 'search',
          chapters: [...selCh.value],
          gids: resultGids.value,
          count: resultGids.value.length,
          timeSec: 0,
          showExp: p.cfg.show_exp,
          source: 'search_batch',
          mode: mode.value
        });
      }
      function quickPractice(q) {
        saveState();
        p.nav('quiz', {
          type: 'search',
          chapters: [...selCh.value],
          gids: [q.gid],
          count: 1,
          timeSec: 0,
          showExp: p.cfg.show_exp,
          source: 'search_quick',
          mode: mode.value
        });
      }

      return { loading, errMsg, query, selCh, pool, result, hotKeywords, toggleCh, startPractice, quickPractice, onScroll, scrollBox, chapters, jumpId, jumpQuestion };
    },
    template: `
    <div class="flex flex-col h-full">
      <div class="flex-shrink-0 bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center gap-3">
        <button @click="nav('home')" class="p-1 text-slate-400 hover:text-slate-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="font-semibold">題目搜尋</h1>
      </div>
      <div ref="scrollBox" @scroll.passive="onScroll" class="flex-1 overflow-y-auto">
        <div v-if="loading" class="h-full flex items-center justify-center">
          <div class="text-center"><div class="text-4xl mb-3">🔎</div><p class="text-slate-400">建立搜尋索引中…</p></div>
        </div>
        <div v-else-if="errMsg" class="h-full flex items-center justify-center px-6 text-center">
          <div><div class="text-4xl mb-3">⚠️</div><p class="text-slate-300 font-medium mb-2">{{errMsg}}</p><button @click="nav('home')" class="bg-blue-600 px-6 py-2 rounded-lg text-white mt-2">返回首頁</button></div>
        </div>
        <div v-else class="px-4 py-4 space-y-4">
          <div>
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">選擇章節</p>
            <div class="grid grid-cols-2 gap-2">
              <button v-for="ch in chapters" :key="ch.num" @click="toggleCh(ch.num)"
                :class="selCh.includes(ch.num)?'border-blue-500 bg-blue-900/30 text-blue-300':'border-slate-700 bg-slate-900 text-slate-300'"
                class="border rounded-xl p-3 text-left transition-colors">
                <div class="text-xs font-mono text-slate-500 mb-1">CH{{ch.num}}</div>
                <div class="text-sm font-medium leading-tight">{{ch.short}}</div>
                <div class="text-xs text-slate-500 mt-1">{{ch.total}} 題</div>
              </button>
            </div>
          </div>

          <div class="bg-slate-900 border border-slate-800 rounded-xl p-3">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">按題號跳題</p>
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
              <input v-model.trim="jumpId" type="text" inputmode="text" placeholder="章節-題號，例如 2-5" class="flex-1 bg-transparent outline-none text-sm placeholder:text-slate-500">
              <button v-if="jumpId" @click="jumpId=''" class="text-xs text-slate-400 hover:text-slate-200">清除</button>
            </div>
            <p v-if="jumpId && !jumpQuestion" class="text-xs text-slate-500 mt-2">找不到，請輸入格式：章節-題號（如 2-5）</p>
            <button v-if="jumpQuestion" @click="quickPractice(jumpQuestion)" class="mt-2.5 w-full text-left bg-slate-800 border border-slate-700 rounded-xl p-3 transition-colors hover:bg-slate-700/70 hover:border-slate-600">
              <div class="flex items-center gap-2 mb-1.5">
                <span class="text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded font-mono">CH{{jumpQuestion.chapter}}</span>
                <span class="text-xs text-slate-500">題號 {{jumpQuestion.id}}</span>
                <span class="ml-auto text-xs text-blue-400">快速作答</span>
              </div>
              <p class="text-sm text-slate-300 leading-relaxed line-clamp-2">{{jumpQuestion.question}}</p>
            </button>
          </div>

          <div class="bg-slate-900 border border-slate-800 rounded-xl p-3">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M16 10a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
              <input v-model.trim="query" type="text" placeholder="搜尋題幹、選項或解題說明" class="flex-1 bg-transparent outline-none text-sm placeholder:text-slate-500">
              <button v-if="query" @click="query=''" class="text-xs text-slate-400 hover:text-slate-200">清除</button>
            </div>
            <p class="text-xs text-slate-500 mt-2">目前範圍：{{pool.length}} 題</p>
          </div>

          <div>
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">法規關鍵字索引</p>
            <div class="flex flex-wrap gap-2">
              <button v-for="k in hotKeywords" :key="k.word" @click="query=k.word" class="text-xs px-2.5 py-1.5 rounded-full border transition-colors"
                :class="query===k.word?'border-blue-500 bg-blue-900/30 text-blue-300':'border-slate-700 bg-slate-900 text-slate-300 hover:bg-slate-800'">
                {{k.word}} <span class="text-slate-500">({{k.freq}})</span>
              </button>
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-3">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">搜尋結果</p>
              <div class="flex items-center gap-3">
                <span class="text-xs text-slate-500">點題目可快速作答 1 題</span>
                <span class="text-sm text-slate-400">{{result.length}} 題</span>
              </div>
            </div>
            <div v-if="!query" class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm text-slate-400">輸入關鍵字或點選上方索引開始搜尋。</div>
            <div v-else-if="result.length===0" class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm text-slate-400">找不到符合「{{query}}」的題目，請換個關鍵字。</div>
            <div v-else class="space-y-2.5">
              <button v-for="q in result" :key="q.gid" @click="quickPractice(q)" @keydown.enter.prevent="quickPractice(q)" @keydown.space.prevent="quickPractice(q)" class="w-full text-left bg-slate-900 border border-slate-800 rounded-xl p-3 transition-colors hover:bg-slate-800/70 hover:border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded font-mono">CH{{q.chapter}}</span>
                  <span class="text-xs text-slate-500">題號 {{q.id}}</span>
                  <span class="ml-auto text-xs text-blue-400">快速作答</span>
                </div>
                <p class="text-sm text-slate-300 leading-relaxed">{{q.question}}</p>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="flex-shrink-0 safe-bottom border-t border-slate-800 bg-slate-950 px-4 py-3">
        <button @click="startPractice" :disabled="result.length===0" :class="result.length>0?'bg-blue-600 hover:bg-blue-500':'bg-slate-700 opacity-50 cursor-not-allowed'" class="w-full py-3.5 rounded-xl font-semibold text-white text-sm transition-colors">開始搜尋練習（{{result.length}} 題）</button>
      </div>
    </div>`
  };

  // ════════════════════════════════════════════════════════════════
  // APP ROOT
  // ════════════════════════════════════════════════════════════════
  const App = {
    setup() {
      migrateProgressIfNeeded();

      const mode = ref(load('dq_mode', 'exam'));
      function setMode(m) {
        if (mode.value === m) return;
        mode.value = m;
        save('dq_mode', m);
      }
      provide('mode', mode);
      provide('setMode', setMode);
      provide('chapters', computed(() => CHAPTERS_DEF[mode.value]));

      const { prog, wrong, record, clearAll: clearProg } = useProgress(mode);
      const { sessions, addSession, clearAll: clearSess } = useSessions(mode);
      const { cfg, persist } = useSettings();
      const { clearAllPos } = useSeqPos(mode);

      const view = ref('home');
      const params = ref(null);
      const quizKey = ref(0);

      function nav(v, p=null) { params.value=p; view.value=v; if(v==='quiz') quizKey.value++; window.scrollTo(0,0); }
      function clearAll() { clearProg(); clearSess(); clearAllPos(); }

      return { view, params, quizKey, nav, prog, wrong, sessions, cfg, record, addSession, persist, clearAll };
    },
    template: `
    <div class="h-full flex lg:flex-row flex-col">
      <!-- Desktop sidebar -->
      <div class="hidden lg:flex flex-col w-60 flex-shrink-0 bg-slate-900 border-r border-slate-800 p-4">
        <div class="flex items-center gap-3 mb-4 px-2">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" :class="params?.mode==='normal'||view==='home'?'bg-blue-600':'bg-blue-600'">🚁</div>
          <div><div class="font-bold">無人機練習</div><div class="text-xs text-slate-500">台灣學科考試</div></div>
        </div>
        <nav class="space-y-1 flex-1">
          <button @click="nav('home')" :class="view==='home'?'bg-blue-900/40 text-blue-300':'text-slate-400 hover:text-slate-200 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">🏠 首頁</button>
          <button @click="nav('setup',{type:'chapter_seq'})" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors">📖 章節練習</button>
          <button @click="nav('setup',{type:'random'})" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors">🎲 隨機練習</button>
          <button @click="nav('setup',{type:'timed'})" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors">⏱️ 限時考試</button>
          <button @click="nav('search')" :class="view==='search'?'bg-blue-900/40 text-blue-300':'text-slate-400 hover:text-slate-200 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">🔎 題目搜尋</button>
          <button @click="wrong.length>0&&nav('setup',{type:'wrong'})" :disabled="wrong.length===0" :class="wrong.length===0?'opacity-40 cursor-not-allowed':'hover:text-slate-200 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 transition-colors">
            🔁 錯題複習
            <span v-if="wrong.length>0" class="ml-auto text-xs bg-red-900/50 text-red-400 px-1.5 py-0.5 rounded-full">{{wrong.length}}</span>
          </button>
        </nav>
        <div class="space-y-1">
          <button @click="nav('stats')" :class="view==='stats'?'bg-blue-900/40 text-blue-300':'text-slate-400 hover:text-slate-200 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">📊 學習統計</button>
          <button @click="nav('settings')" :class="view==='settings'?'bg-blue-900/40 text-blue-300':'text-slate-400 hover:text-slate-200 hover:bg-slate-800'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">⚙️ 設定</button>
        </div>
      </div>

      <!-- Main content -->
      <div class="flex-1 flex flex-col min-h-0 relative">
        <transition name="fade" mode="out-in">
          <HomeView  v-if="view==='home'"     key="home"     :prog="prog" :wrong="wrong" :nav="nav"/>
          <SetupView v-else-if="view==='setup'"  :key="'setup_'+params?.type" :params="params" :wrong="wrong" :cfg="cfg" :nav="nav"/>
          <QuizView  v-else-if="view==='quiz'"   :key="quizKey" :params="params" :wrong="wrong" :onRecord="record" :nav="nav"/>
          <ResultView v-else-if="view==='result'" key="result"  :params="params" :onSave="addSession" :nav="nav"/>
          <SearchView v-else-if="view==='search'" key="search"  :cfg="cfg" :nav="nav"/>
          <StatsView  v-else-if="view==='stats'"  key="stats"   :prog="prog" :wrong="wrong" :sessions="sessions" :nav="nav" :onClear="clearAll"/>
          <SettingsView v-else-if="view==='settings'" key="settings" :cfg="cfg" :nav="nav" :onSave="persist"/>
        </transition>
      </div>

      <!-- Mobile bottom nav -->
      <div v-if="view!=='quiz'" class="lg:hidden flex-shrink-0 bg-slate-900 border-t border-slate-800 safe-bottom">
        <div class="flex">
          <button @click="nav('home')" class="flex-1 py-2.5 flex flex-col items-center gap-0.5" :class="view==='home'?'text-blue-400':'text-slate-500'"><span class="text-xl">🏠</span><span class="text-xs">首頁</span></button>
          <button @click="nav('search')" class="flex-1 py-2.5 flex flex-col items-center gap-0.5" :class="view==='search'?'text-blue-400':'text-slate-500'"><span class="text-xl">🔎</span><span class="text-xs">搜尋</span></button>
          <button @click="nav('stats')" class="flex-1 py-2.5 flex flex-col items-center gap-0.5" :class="view==='stats'?'text-blue-400':'text-slate-500'"><span class="text-xl">📊</span><span class="text-xs">統計</span></button>
          <button @click="nav('settings')" class="flex-1 py-2.5 flex flex-col items-center gap-0.5" :class="view==='settings'?'text-blue-400':'text-slate-500'"><span class="text-xl">⚙️</span><span class="text-xs">設定</span></button>
        </div>
      </div>
    </div>`
  };

  const app = createApp(App);
  app.component('HomeView', HomeView);
  app.component('SetupView', SetupView);
  app.component('QuizView', QuizView);
  app.component('ResultView', ResultView);
  app.component('SearchView', SearchView);
  app.component('StatsView', StatsView);
  app.component('SettingsView', SettingsView);
  app.mount('#app');

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
  </script>
</body>
</html>
