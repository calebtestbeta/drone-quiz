<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>無人機操控模擬器 — ALIGN M460</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
    #c { display: block; width: 100vw; height: 100vh; }

    /* ── HUD overlay ── */
    #hud { position: absolute; inset: 0; pointer-events: none; user-select: none; }

    /* Top status bar */
    #sb {
      position: absolute; top: 0; left: 0; right: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 60%, transparent);
      padding: 10px 14px 22px;
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px 12px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.2px;
    }
    .si { display: flex; align-items: center; gap: 3px; }
    .sv { color: #fff; }
    .sl { color: rgba(255,255,255,0.5); font-size: 10px; }
    .sdiv { width: 1px; height: 13px; background: rgba(255,255,255,0.18); }
    #mode-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
      background: rgba(59,130,246,0.85); letter-spacing: 0.5px;
    }
    #mode-badge.rth { background: rgba(249,115,22,0.9); }

    /* Artificial horizon (bottom-left) */
    #ahi-wrap {
      position: absolute; left: 10px;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 140px);
      width: 90px; height: 90px;
    }

    /* Vertical speed tape (next to horizon) */
    #vsi {
      position: absolute; left: 106px;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 140px);
      width: 28px; height: 90px;
      background: rgba(0,0,0,0.45); border-radius: 5px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 9px; gap: 2px;
    }
    #vsi-bar-wrap {
      width: 8px; height: 62px;
      background: rgba(255,255,255,0.1); border-radius: 4px;
      position: relative; overflow: hidden;
    }
    #vsi-bar {
      position: absolute; bottom: 50%; left: 0; right: 0;
      background: #22d3ee; border-radius: 2px;
      transition: height 0.1s, top 0.1s;
    }

    /* Compass (bottom-right) */
    #cmp-wrap {
      position: absolute; right: 10px;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 140px);
      width: 82px; height: 82px;
    }

    /* Altitude display (right of compass) */
    #alt-disp {
      position: absolute; right: 98px;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 140px);
      width: 40px; height: 82px;
      background: rgba(0,0,0,0.45); border-radius: 5px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px;
    }
    #alt-val { font-size: 16px; font-weight: 700; color: #fff; line-height: 1; }
    #alt-unit { font-size: 9px; color: rgba(255,255,255,0.5); }

    /* Warnings */
    #warns {
      position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      pointer-events: none; z-index: 10;
    }
    .wb {
      padding: 5px 14px; border-radius: 7px; font-size: 12px; font-weight: 700;
      backdrop-filter: blur(6px); white-space: nowrap; text-align: center;
    }
    .wy { background: rgba(234,179,8,0.88); color: #000; }
    .wr { background: rgba(239,68,68,0.92); color: #fff; animation: fl 0.7s infinite; }
    @keyframes fl { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* Disarmed hint */
    #hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none;
    }
    #hint h2 { font-size: 20px; margin-bottom: 5px; opacity: 0.9; }
    #hint p { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }

    /* Action buttons */
    #act {
      position: absolute;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 145px);
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; pointer-events: all;
    }
    .btn {
      padding: 8px 16px; border-radius: 9px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
      backdrop-filter: blur(8px); transition: transform 0.1s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.92); }
    #ba { background: rgba(34,197,94,0.85); color: #fff; }
    #ba.armed { background: rgba(239,68,68,0.85); }
    #br { background: rgba(249,115,22,0.85); color: #fff; }
    #br:disabled { opacity: 0.35; cursor: default; }

    /* View toggle */
    #vt {
      position: absolute;
      bottom: calc(max(10px, env(safe-area-inset-bottom, 10px)) + 145px);
      right: 10px;
      pointer-events: all;
    }
    #vt button {
      display: block; padding: 6px 10px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; margin-bottom: 4px;
      background: rgba(255,255,255,0.12); color: #fff; backdrop-filter: blur(6px);
    }
    #vt button.active { background: rgba(59,130,246,0.7); }

    /* Virtual joysticks */
    .jz {
      position: absolute;
      bottom: max(10px, env(safe-area-inset-bottom, 10px));
      width: 120px; height: 120px;
      pointer-events: all;
    }
    #jl { left: 8px; }
    #jr { right: 8px; }
    .jr-ring {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      position: relative;
    }
    .jt {
      position: absolute;
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.25);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .jlbl {
      position: absolute; bottom: -16px; left: 0; right: 0;
      text-align: center; font-size: 9px; color: rgba(255,255,255,0.35);
      pointer-events: none;
    }

    /* Back */
    #bk {
      position: absolute; top: 48px; left: 10px;
      padding: 5px 11px; border-radius: 7px; border: none; cursor: pointer;
      background: rgba(0,0,0,0.45); color: #fff; font-size: 12px;
      backdrop-filter: blur(6px); pointer-events: all;
    }

    /* Keyboard hint */
    #kbh {
      position: absolute;
      bottom: calc(max(8px, env(safe-area-inset-bottom, 8px)));
      left: 50%; transform: translateX(-50%);
      font-size: 9px; color: rgba(255,255,255,0.28); white-space: nowrap;
    }
    @media (pointer: coarse) {
      #kbh { display: none; }
      /* Larger joysticks on touch devices */
      .jz { width: 140px; height: 140px; }
      .jt { width: 52px; height: 52px; }
      #bk { padding: 8px 14px; font-size: 14px; }
    }
    @media (pointer: fine) { .jz { opacity: 0.45; } }
    /* Landscape phone: reduce instrument heights */
    @media (max-height: 500px) {
      #ahi-wrap, #cmp-wrap { width: 72px; height: 72px; }
      #alt-disp { height: 72px; }
      #vsi { height: 72px; }
    }

    /* RTH progress ring */
    #rth-ring {
      position: absolute; top: 50px; right: 10px;
      display: none; pointer-events: none;
    }
    #rth-ring.show { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <!-- Status bar -->
  <div id="sb">
    <div class="si">🛰️&nbsp;<span class="sv" id="gps">12</span><span class="sl">GPS</span></div>
    <div class="sdiv"></div>
    <div class="si">🔋&nbsp;<span class="sv" id="bat">100%</span></div>
    <div class="sdiv"></div>
    <div class="si">📶&nbsp;<span class="sv" id="sig">強</span></div>
    <div class="sdiv"></div>
    <span id="mode-badge">P-GPS</span>
    <div class="sdiv"></div>
    <div class="si"><span class="sl">H&nbsp;</span><span class="sv" id="hv">0.0</span><span class="sl">&nbsp;m</span></div>
    <div class="si"><span class="sl">D&nbsp;</span><span class="sv" id="dv">0</span><span class="sl">&nbsp;m</span></div>
    <div class="si"><span class="sl">↕&nbsp;</span><span class="sv" id="vsv">0.0</span><span class="sl">&nbsp;m/s</span></div>
    <div class="si"><span class="sl">→&nbsp;</span><span class="sv" id="hsv">0.0</span><span class="sl">&nbsp;m/s</span></div>
  </div>

  <!-- Artificial Horizon -->
  <div id="ahi-wrap">
    <svg id="ahi" viewBox="-45 -45 90 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <defs>
        <clipPath id="ac"><circle cx="0" cy="0" r="43"/></clipPath>
      </defs>
      <g clip-path="url(#ac)">
        <g id="aw">
          <rect x="-60" y="-100" width="120" height="100" fill="#1565c0"/>
          <rect x="-60" y="0" width="120" height="100" fill="#7b4f2a"/>
          <line x1="-60" y1="0" x2="60" y2="0" stroke="#e8e8e8" stroke-width="1.2"/>
          <g stroke="rgba(255,255,255,0.65)" stroke-width="0.7" fill="none">
            <line x1="-18" y1="-10" x2="18" y2="-10"/>
            <line x1="-18" y1="10" x2="18" y2="10"/>
            <line x1="-12" y1="-20" x2="12" y2="-20"/>
            <line x1="-12" y1="20" x2="12" y2="20"/>
            <line x1="-8" y1="-30" x2="8" y2="-30"/>
            <line x1="-8" y1="30" x2="8" y2="30"/>
          </g>
        </g>
      </g>
      <!-- Fixed aircraft symbol -->
      <line x1="-26" y1="0" x2="-8" y2="0" stroke="#facc15" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="26" y2="0" stroke="#facc15" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2.8" fill="#facc15"/>
      <!-- Roll indicator arc -->
      <path d="M -38 0 A 38 38 0 0 1 38 0" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <circle cx="0" cy="-38" r="2.5" fill="#facc15" id="roll-ind"/>
      <!-- Border -->
      <circle cx="0" cy="0" r="43" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- VSI -->
  <div id="vsi">
    <span style="font-size:8px;color:rgba(255,255,255,0.4)">↑</span>
    <div id="vsi-bar-wrap"><div id="vsi-bar"></div></div>
    <span style="font-size:8px;color:rgba(255,255,255,0.4)">↓</span>
  </div>

  <!-- Altitude display -->
  <div id="alt-disp">
    <div id="alt-val">0</div>
    <div id="alt-unit">m</div>
  </div>

  <!-- Compass -->
  <div id="cmp-wrap">
    <svg id="cmp" viewBox="-42 -42 84 84" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <circle cx="0" cy="0" r="40" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
      <g id="cd">
        <text x="0" y="-28" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#f87171">N</text>
        <text x="28" y="0" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="rgba(255,255,255,0.65)">E</text>
        <text x="0" y="28" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="rgba(255,255,255,0.65)">S</text>
        <text x="-28" y="0" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="rgba(255,255,255,0.65)">W</text>
        <g stroke="rgba(255,255,255,0.35)" stroke-width="1">
          <line x1="0" y1="-38" x2="0" y2="-33"/>
          <line x1="38" y1="0" x2="33" y2="0"/>
          <line x1="0" y1="38" x2="0" y2="33"/>
          <line x1="-38" y1="0" x2="-33" y2="0"/>
          <line x1="27" y1="-27" x2="23" y2="-23"/>
          <line x1="27" y1="27" x2="23" y2="23"/>
          <line x1="-27" y1="27" x2="-23" y2="23"/>
          <line x1="-27" y1="-27" x2="-23" y2="-23"/>
        </g>
      </g>
      <!-- Fixed heading triangle -->
      <polygon points="0,-39 -4,-31 4,-31" fill="#fbbf24"/>
      <!-- Yaw degree display -->
      <text id="hdg-txt" x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="#fff">000°</text>
    </svg>
  </div>

  <!-- Warnings -->
  <div id="warns"></div>

  <!-- Disarmed hint -->
  <div id="hint">
    <h2>🚁 ALIGN M460</h2>
    <p>按下方 ARM 或 Space 鍵解鎖馬達</p>
    <p>左搖桿 ↑↓ 油門 &nbsp;|&nbsp; 左搖桿 ←→ 偏航</p>
    <p>右搖桿 前後左右 飛行</p>
  </div>

  <!-- Back -->
  <button id="bk" onclick="location.href='index.html'">← 返回</button>

  <!-- View toggle -->
  <div id="vt">
    <button id="vt3" class="active" onclick="setView('third')">跟隨</button>
    <button id="vtf" onclick="setView('fpv')">FPV</button>
    <button id="vtt" onclick="setView('top')">俯視</button>
  </div>

  <!-- Action buttons -->
  <div id="act">
    <button class="btn" id="ba">ARM</button>
    <button class="btn" id="br" disabled>RTH</button>
  </div>

  <!-- Left joystick: throttle / yaw -->
  <div class="jz" id="jl">
    <div class="jr-ring" id="jlr"><div class="jt" id="jlt"></div></div>
    <div class="jlbl">油門 / 偏航</div>
  </div>

  <!-- Right joystick: pitch / roll -->
  <div class="jz" id="jr">
    <div class="jr-ring" id="jrr"><div class="jt" id="jrt"></div></div>
    <div class="jlbl">前後 / 左右</div>
  </div>

  <!-- Keyboard hint -->
  <div id="kbh">↑↓ 油門 &nbsp;←→ 偏航 &nbsp;|&nbsp; WASD 前後左右 &nbsp;|&nbsp; Space ARM &nbsp;|&nbsp; R RTH &nbsp;|&nbsp; V 切換視角</div>
</div>

<script src="https://unpkg.com/three@0.160.1/build/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════
// THREE.JS SETUP
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec8f0);
scene.fog = new THREE.FogExp2(0xaed8f0, 0.005);

const camMain = new THREE.PerspectiveCamera(60, 1, 0.05, 600);
const camFPV  = new THREE.PerspectiveCamera(80, 1, 0.05, 600);
const camTop  = new THREE.PerspectiveCamera(45, 1, 0.05, 600);

let activeView = 'third'; // 'third' | 'fpv' | 'top'

function onResize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  [camMain, camFPV, camTop].forEach(c => { c.aspect = W/H; c.updateProjectionMatrix(); });
}
window.addEventListener('resize', onResize);
onResize();

// ── Lighting ──────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xfff8e8, 1.1);
sun.position.set(60, 90, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.near=1; sc.far=400; sc.left=sc.bottom=-100; sc.right=sc.top=100;
scene.add(sun);

// ── Ground ────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshLambertMaterial({ color: 0x4a7a3a })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Road markings grid
const grid = new THREE.GridHelper(300, 60, 0x3a6030, 0x3a6030);
grid.position.y = 0.02;
grid.material.opacity = 0.35;
grid.material.transparent = true;
scene.add(grid);

// Home pad (H marker)
function makeHomePad() {
  const g = new THREE.Group();
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(1.5, 32),
    new THREE.MeshLambertMaterial({ color: 0xffffff, opacity: 0.55, transparent: true })
  );
  disc.rotation.x = -Math.PI/2; disc.position.y = 0.02;
  g.add(disc);
  const inner = new THREE.Mesh(
    new THREE.CircleGeometry(1.0, 32),
    new THREE.MeshLambertMaterial({ color: 0xf97316, opacity: 0.7, transparent: true })
  );
  inner.rotation.x = -Math.PI/2; inner.position.y = 0.03;
  g.add(inner);
  return g;
}
const homePad = makeHomePad();
scene.add(homePad);

// ── Environment: buildings + trees ───────────────────────────
function addBuilding(x, z, w, h, d, col) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: col || 0x8090a0 })
  );
  m.position.set(x, h/2, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(w+0.3, 0.5, d+0.3),
    new THREE.MeshLambertMaterial({ color: 0x607080 })
  );
  roof.position.set(x, h+0.25, z);
  scene.add(roof);
  // Windows
  for (let wy = 2; wy < h - 1; wy += 3) {
    for (let wx = -w/2 + 1; wx < w/2; wx += 2.5) {
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(1.2, 1.6),
        new THREE.MeshBasicMaterial({ color: 0xfff8c0, opacity: 0.7, transparent: true })
      );
      win.position.set(x + wx, wy, z + d/2 + 0.01);
      scene.add(win);
    }
  }
}

addBuilding(35, -18, 9, 14, 8, 0x7a8898);
addBuilding(-28, -32, 7, 9, 7, 0x8a9aa8);
addBuilding(22, 35, 11, 18, 10, 0x6e7d8c);
addBuilding(-40, 18, 8, 11, 8, 0x7b8a99);
addBuilding(50, 10, 6, 7, 6, 0x8c9baa);
addBuilding(-15, 42, 9, 13, 8, 0x78889a);

function addTree(x, z, h) {
  h = h || (3 + Math.random() * 2);
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.22, h*0.45, 6),
    new THREE.MeshLambertMaterial({ color: 0x5c3818 })
  );
  trunk.position.set(x, h*0.225, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const crown = new THREE.Mesh(
    new THREE.ConeGeometry(1.8+Math.random()*0.6, h*0.7, 7),
    new THREE.MeshLambertMaterial({ color: 0x2d6a1d - Math.floor(Math.random()*0x101010) })
  );
  crown.position.set(x, h*0.6, z);
  crown.castShadow = true;
  scene.add(crown);
}

// Ring of trees around the field
for (let i = 0; i < 30; i++) {
  const a = (i/30) * Math.PI * 2;
  const r = 22 + Math.random() * 6;
  addTree(Math.cos(a)*r + (Math.random()-0.5)*4, Math.sin(a)*r + (Math.random()-0.5)*4);
}
// Scattered trees
for (let i = 0; i < 15; i++) {
  addTree((Math.random()-0.5)*80, (Math.random()-0.5)*80);
}

// ════════════════════════════════════════════════════════════════
// ALIGN M460 DRONE MODEL
// ════════════════════════════════════════════════════════════════
const drone = new THREE.Group();
scene.add(drone);

// Materials
const matDarkGray = new THREE.MeshLambertMaterial({ color: 0x22252b });
const matMidGray  = new THREE.MeshLambertMaterial({ color: 0x363b44 });
const matBlack    = new THREE.MeshLambertMaterial({ color: 0x0d0e10 });
const matAccent   = new THREE.MeshLambertMaterial({ color: 0x3a4050 }); // subtle blue-gray
const matProp     = new THREE.MeshLambertMaterial({ color: 0x1a1c20, transparent: true, opacity: 0.88 });
const matLedG     = new THREE.MeshBasicMaterial({ color: 0x00ff55 });
const matLedR     = new THREE.MeshBasicMaterial({ color: 0xff2200 });

// ── Central body ──
const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.21, 0.09, 0.19), matDarkGray);
bodyMesh.castShadow = true;
drone.add(bodyMesh);

// Top shell (slightly domed look with a flat plate)
const topShell = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.02, 0.16), matMidGray);
topShell.position.set(0, 0.055, 0);
drone.add(topShell);

// Battery sled on top
const batSled = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.03, 0.13), matAccent);
batSled.position.set(0, 0.07, 0.01);
drone.add(batSled);

// Processor bump (center bottom)
const procBump = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.015, 0.06), matDarkGray);
procBump.position.set(0, -0.052, 0);
drone.add(procBump);

// ── Camera Gimbal ──
const gimbalArm = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.035, 0.025), matBlack);
gimbalArm.position.set(0, -0.06, -0.09);
drone.add(gimbalArm);

const gimbalBody = new THREE.Mesh(new THREE.BoxGeometry(0.052, 0.048, 0.048), matBlack);
gimbalBody.position.set(0, -0.065, -0.105);
drone.add(gimbalBody);

const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.014, 0.022, 10), matBlack);
lens.rotation.x = Math.PI / 2;
lens.position.set(0, -0.065, -0.127);
drone.add(lens);

const lensGlass = new THREE.Mesh(
  new THREE.CircleGeometry(0.012, 10),
  new THREE.MeshBasicMaterial({ color: 0x223355, transparent: true, opacity: 0.8 })
);
lensGlass.rotation.x = Math.PI / 2;
lensGlass.position.set(0, -0.065, -0.138);
drone.add(lensGlass);

// ── Landing gear (2 skids) ──
[-0.09, 0.09].forEach(xo => {
  const skid = new THREE.Mesh(new THREE.BoxGeometry(0.016, 0.008, 0.20), matBlack);
  skid.position.set(xo, -0.10, 0);
  drone.add(skid);
  [-0.065, 0.065].forEach(zo => {
    const strut = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.055, 4), matBlack);
    strut.position.set(xo, -0.073, zo);
    drone.add(strut);
  });
});

// ── 4 Arms + Motors + Props ──
// front-right=-45°, front-left=-135°, rear-right=+45°, rear-left=+135°
// (relative to drone's local -Z forward)
const ARM_ANGLES_DEG = [-45, -135, 45, 135];
const ARM_IS_FRONT   = [true, true, false, false];
const propGroups = [];

ARM_ANGLES_DEG.forEach((deg, idx) => {
  const ag = new THREE.Group();
  ag.rotation.y = THREE.MathUtils.degToRad(deg);
  drone.add(ag);

  // Arm body (extends in +X from center)
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.022, 0.030), matMidGray);
  arm.position.x = 0.15;
  arm.castShadow = true;
  ag.add(arm);

  // Arm tip plate
  const tip = new THREE.Mesh(new THREE.BoxGeometry(0.032, 0.030, 0.032), matDarkGray);
  tip.position.x = 0.30;
  ag.add(tip);

  // Motor can
  const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.036, 0.036, 0.046, 12), matBlack);
  motor.position.set(0.30, 0.028, 0);
  ag.add(motor);

  // Motor top cap (lighter shade)
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.036, 0.010, 12), matMidGray);
  cap.position.set(0.30, 0.055, 0);
  ag.add(cap);

  // Propeller group (spins)
  const pg = new THREE.Group();
  pg.position.set(0.30, 0.064, 0);
  // 2-blade prop: one box + cross bar
  const b1 = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.004, 0.020), matProp);
  const b2 = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.004, 0.020), matProp);
  b2.rotation.y = Math.PI / 2; // 4-blade look
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.014, 0.014, 0.010, 8), matBlack);
  pg.add(b1); pg.add(b2); pg.add(hub);
  ag.add(pg);
  propGroups.push(pg);

  // LED light sphere
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.010, 6, 6), ARM_IS_FRONT[idx] ? matLedG : matLedR);
  led.position.set(0.30, 0.070, 0);
  ag.add(led);

  // LED point light
  const pl = new THREE.PointLight(ARM_IS_FRONT[idx] ? 0x00ff44 : 0xff2200, 0.25, 1.8);
  pl.position.copy(led.position);
  ag.add(pl);
});

// FPV camera pivot (attached to drone for FPV view)
const fpvPivot = new THREE.Object3D();
fpvPivot.position.set(0, 0, -0.14);
drone.add(fpvPivot);

// ════════════════════════════════════════════════════════════════
// PHYSICS STATE
// ════════════════════════════════════════════════════════════════
const S = {
  pos:    new THREE.Vector3(0, 1.5, 0),
  vel:    new THREE.Vector3(),
  yaw:    0,        // radians (drone heading)
  vPitch: 0,        // visual lean angle (rad)
  vRoll:  0,
  battery: 100,
  armed:   false,
  rth:     false,
  autoLand: false,
  homePos: new THREE.Vector3(0, 0, 0),
  mode:    'P-GPS',
};

const P = {
  liftAccel:    9,    // m/s² per unit stick (up)
  descentAccel: 5,
  horizAccel:   10,
  maxV:         8,    // m/s horizontal
  maxVV:        5,    // m/s vertical
  yawRate:      2.0,  // rad/s
  hDrag:        2.2,  // horizontal damping coefficient
  vDrag:        3.0,
  maxTilt:      0.30, // visual tilt max (rad)
};

// ════════════════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════════════════
const inp = { lx: 0, ly: 0, rx: 0, ry: 0 };
const keys = {};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); toggleArm(); }
  if (e.code === 'KeyR')  { e.preventDefault(); triggerRTH(); }
  if (e.code === 'KeyV')  { cycleView(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function applyKeyInput(dt) {
  // Smooth keyboard input (ramp up/down)
  const spd = 3;
  if (keys['ArrowUp'])    inp.ly = Math.min(inp.ly + spd*dt, 1);
  else if (keys['ArrowDown'])  inp.ly = Math.max(inp.ly - spd*dt, -1);
  else inp.ly *= Math.exp(-spd * dt * 2);

  if (keys['ArrowRight']) inp.lx = Math.min(inp.lx + spd*dt, 1);
  else if (keys['ArrowLeft'])  inp.lx = Math.max(inp.lx - spd*dt, -1);
  else inp.lx *= Math.exp(-spd * dt * 2);

  if (keys['KeyW'])  inp.ry = Math.min(inp.ry + spd*dt, 1);
  else if (keys['KeyS'])   inp.ry = Math.max(inp.ry - spd*dt, -1);
  else inp.ry *= Math.exp(-spd * dt * 2);

  if (keys['KeyD'])  inp.rx = Math.min(inp.rx + spd*dt, 1);
  else if (keys['KeyA'])   inp.rx = Math.max(inp.rx - spd*dt, -1);
  else inp.rx *= Math.exp(-spd * dt * 2);
}

// ── Virtual joysticks ────────────────────────────────────────
function makeJoy(ringEl, thumbEl, cb) {
  const R = 46; // max thumb travel in px
  let pid = null, cx = 0, cy = 0;

  ringEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    ringEl.setPointerCapture(e.pointerId);
    pid = e.pointerId;
    const r = ringEl.getBoundingClientRect();
    cx = r.left + r.width / 2;
    cy = r.top  + r.height / 2;
    move(e.clientX, e.clientY);
  });
  ringEl.addEventListener('pointermove', e => {
    if (e.pointerId !== pid) return;
    move(e.clientX, e.clientY);
  });
  ['pointerup','pointercancel'].forEach(ev => {
    ringEl.addEventListener(ev, e => {
      if (e.pointerId !== pid) return;
      pid = null;
      thumbEl.style.transform = 'translate(-50%,-50%)';
      cb(0, 0);
    });
  });

  function move(px, py) {
    let dx = px - cx, dy = py - cy;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > R) { dx = dx/d*R; dy = dy/d*R; }
    thumbEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    cb(dx / R, -dy / R); // y inverted (up = positive)
  }
}

makeJoy(
  document.getElementById('jlr'), document.getElementById('jlt'),
  (x, y) => { inp.lx = x; inp.ly = y; }
);
makeJoy(
  document.getElementById('jrr'), document.getElementById('jrt'),
  (x, y) => { inp.rx = x; inp.ry = y; }
);

// ════════════════════════════════════════════════════════════════
// ARM / RTH
// ════════════════════════════════════════════════════════════════
const baBtn = document.getElementById('ba');
const brBtn = document.getElementById('br');
const hintEl = document.getElementById('hint');

function toggleArm() {
  if (S.rth || S.autoLand) return;
  S.armed = !S.armed;
  baBtn.textContent = S.armed ? 'DISARM' : 'ARM';
  baBtn.classList.toggle('armed', S.armed);
  brBtn.disabled = !S.armed;
  hintEl.style.display = S.armed ? 'none' : 'block';
  if (!S.armed) {
    S.vel.set(0, 0, 0);
    S.vPitch = 0; S.vRoll = 0;
    setMode('P-GPS');
  }
}

function triggerRTH() {
  if (!S.armed || S.rth) return;
  S.rth = true;
  setMode('RTH');
}

function setMode(m) {
  S.mode = m;
  const badge = document.getElementById('mode-badge');
  badge.textContent = m;
  badge.className = m === 'RTH' ? 'rth' : '';
  badge.id = 'mode-badge';
}

baBtn.addEventListener('click', toggleArm);
brBtn.addEventListener('click', triggerRTH);

// ════════════════════════════════════════════════════════════════
// PHYSICS UPDATE
// ════════════════════════════════════════════════════════════════
function updatePhysics(dt) {
  if (!S.armed) return;
  dt = Math.min(dt, 0.033);

  if (S.rth)      { updateRTH(dt); return; }
  if (S.autoLand) { updateAutoLand(dt); return; }

  // ── Vertical ──
  let vAccel = 0;
  if (inp.ly > 0) vAccel =  inp.ly * P.liftAccel;
  else            vAccel =  inp.ly * P.descentAccel;
  S.vel.y += vAccel * dt;
  S.vel.y *= Math.exp(-P.vDrag * dt);
  S.vel.y  = THREE.MathUtils.clamp(S.vel.y, -P.maxVV, P.maxVV);

  // ── Yaw ──
  S.yaw -= inp.lx * P.yawRate * dt;

  // ── Horizontal (body-relative) ──
  // drone forward = (-sin(yaw), 0, -cos(yaw))
  const sinY = Math.sin(S.yaw), cosY = Math.cos(S.yaw);
  const fwdX = -sinY, fwdZ = -cosY;   // forward in world
  const rgtX =  cosY, rgtZ = -sinY;   // right in world

  S.vel.x += (inp.ry * fwdX + inp.rx * rgtX) * P.horizAccel * dt;
  S.vel.z += (inp.ry * fwdZ + inp.rx * rgtZ) * P.horizAccel * dt;

  // Horizontal drag
  const hdrag = Math.exp(-P.hDrag * dt);
  S.vel.x *= hdrag;
  S.vel.z *= hdrag;

  // Speed limit
  const hs = Math.sqrt(S.vel.x**2 + S.vel.z**2);
  if (hs > P.maxV) { S.vel.x = S.vel.x/hs*P.maxV; S.vel.z = S.vel.z/hs*P.maxV; }

  // ── Integrate ──
  S.pos.addScaledVector(S.vel, dt);

  // Ground clamp
  if (S.pos.y < 0.12) { S.pos.y = 0.12; if (S.vel.y < 0) S.vel.y = 0; }

  // ── Visual tilt ──
  const tp = P.maxTilt;
  S.vPitch = THREE.MathUtils.lerp(S.vPitch,  inp.ry * tp,  dt * 9);
  S.vRoll  = THREE.MathUtils.lerp(S.vRoll,  -inp.rx * tp,  dt * 9);
}

function updateRTH(dt) {
  const rthAlt = Math.max(S.homePos.y + 12, S.pos.y);
  const toHome = new THREE.Vector3(S.homePos.x - S.pos.x, 0, S.homePos.z - S.pos.z);
  const dist = toHome.length();

  // Rise to RTH altitude
  if (S.pos.y < rthAlt - 0.5) {
    S.vel.y = THREE.MathUtils.lerp(S.vel.y, 3.5, dt * 2.5);
    S.vel.x *= 0.92; S.vel.z *= 0.92;
  } else if (dist > 1.0) {
    // Fly to home horizontally
    const spd = Math.min(dist * 1.8, 5);
    toHome.normalize().multiplyScalar(spd);
    S.vel.x = THREE.MathUtils.lerp(S.vel.x, toHome.x, dt * 2.5);
    S.vel.z = THREE.MathUtils.lerp(S.vel.z, toHome.z, dt * 2.5);
    S.vel.y = THREE.MathUtils.lerp(S.vel.y, 0, dt * 3);
    S.yaw = THREE.MathUtils.lerp(S.yaw, Math.atan2(-toHome.x, -toHome.z), dt * 1.5);
  } else {
    // Descend to land
    S.vel.x = THREE.MathUtils.lerp(S.vel.x, 0, dt * 5);
    S.vel.z = THREE.MathUtils.lerp(S.vel.z, 0, dt * 5);
    S.vel.y = -1.8;
  }

  S.pos.addScaledVector(S.vel, dt);
  S.vPitch = THREE.MathUtils.lerp(S.vPitch, 0, dt * 5);
  S.vRoll  = THREE.MathUtils.lerp(S.vRoll,  0, dt * 5);

  if (S.pos.y <= 0.12) land();
}

function updateAutoLand(dt) {
  S.vel.x = THREE.MathUtils.lerp(S.vel.x, 0, dt * 4);
  S.vel.z = THREE.MathUtils.lerp(S.vel.z, 0, dt * 4);
  S.vel.y = -1.0;
  S.pos.addScaledVector(S.vel, dt);
  if (S.pos.y <= 0.12) land();
}

function land() {
  S.pos.y = 0.12; S.vel.set(0, 0, 0);
  S.rth = false; S.autoLand = false; S.armed = false;
  setMode('P-GPS');
  baBtn.textContent = 'ARM'; baBtn.classList.remove('armed');
  brBtn.disabled = true; hintEl.style.display = 'block';
}

// ── Battery ───────────────────────────────────────────────────
let batTimer = 0;
function updateBattery(dt) {
  if (!S.armed) return;
  batTimer += dt;
  if (batTimer < 0.25) return;
  const t = batTimer; batTimer = 0;
  const hs = Math.sqrt(S.vel.x**2 + S.vel.z**2);
  S.battery -= (0.03 + Math.abs(S.vel.y)*0.012 + hs*0.006) * t;
  S.battery = Math.max(0, S.battery);
  if (S.battery <= 0 && !S.autoLand && !S.rth) { S.autoLand = true; setMode('RTH'); }
  else if (S.battery <= 15 && !S.rth && !S.autoLand) { triggerRTH(); }
}

// ════════════════════════════════════════════════════════════════
// CAMERA
// ════════════════════════════════════════════════════════════════
function updateCameras(dt) {
  // Third-person: behind and above drone
  const sinY = Math.sin(S.yaw), cosY = Math.cos(S.yaw);
  const behind = new THREE.Vector3(sinY * 7, 3.5, cosY * 7);
  const thirdTarget = S.pos.clone().add(behind);
  camMain.position.lerp(thirdTarget, Math.min(1, dt * 6));
  camMain.lookAt(S.pos.x, S.pos.y + 0.4, S.pos.z);

  // FPV: from drone's camera position looking forward
  const wp = new THREE.Vector3();
  fpvPivot.getWorldPosition(wp);
  camFPV.position.copy(wp);
  camFPV.rotation.set(S.vPitch * 0.5 - 0.05, S.yaw + Math.PI, S.vRoll * 0.4, 'YXZ');

  // Top-down
  camTop.position.set(S.pos.x, S.pos.y + 40, S.pos.z + 0.001);
  camTop.lookAt(S.pos.x, S.pos.y, S.pos.z);
}

function getActiveCamera() {
  if (activeView === 'fpv') return camFPV;
  if (activeView === 'top') return camTop;
  return camMain;
}

// View toggle
function setView(v) {
  activeView = v;
  document.getElementById('vt3').classList.toggle('active', v === 'third');
  document.getElementById('vtf').classList.toggle('active', v === 'fpv');
  document.getElementById('vtt').classList.toggle('active', v === 'top');
}
function cycleView() {
  const views = ['third', 'fpv', 'top'];
  setView(views[(views.indexOf(activeView) + 1) % 3]);
}

// ════════════════════════════════════════════════════════════════
// PROPELLER + DRONE VISUAL
// ════════════════════════════════════════════════════════════════
let propAngle = 0;
function updateDroneVisual(dt) {
  // Spin props when armed
  if (S.armed) propAngle += dt * 28;
  propGroups.forEach((pg, i) => {
    pg.rotation.y = propAngle * (i % 2 === 0 ? 1 : -1);
    // Blur effect: when spinning fast, adjust opacity
    pg.traverse(child => {
      if (child.isMesh && child.material === matProp) {
        child.material.opacity = S.armed ? 0.45 : 0.88;
      }
    });
  });

  // Apply position + rotation
  drone.position.copy(S.pos);
  drone.rotation.y = S.yaw;
  drone.rotation.x = S.vPitch;
  drone.rotation.z = S.vRoll;

  // Ground shadow (drone casts shadow)
  drone.castShadow = true;
}

// ════════════════════════════════════════════════════════════════
// HUD UPDATE
// ════════════════════════════════════════════════════════════════
const $hv   = document.getElementById('hv');
const $dv   = document.getElementById('dv');
const $vsv  = document.getElementById('vsv');
const $hsv  = document.getElementById('hsv');
const $bat  = document.getElementById('bat');
const $warns = document.getElementById('warns');
const $altV = document.getElementById('alt-val');
const $hdgT = document.getElementById('hdg-txt');
const ahiW  = document.getElementById('aw');
const rollInd = document.getElementById('roll-ind');
const cmpDisc = document.getElementById('cd');
const vsiBar = document.getElementById('vsi-bar');

let lastHud = 0;
function updateHUD(now) {
  if (now - lastHud < 80) return;
  lastHud = now;

  const alt  = Math.max(0, S.pos.y - 0.12);
  const dist = S.pos.distanceTo(S.homePos);
  const hs   = Math.sqrt(S.vel.x**2 + S.vel.z**2);
  const bat  = Math.max(0, S.battery);
  const batPct = Math.round(bat);

  $hv.textContent   = alt.toFixed(1);
  $dv.textContent   = dist.toFixed(0);
  $vsv.textContent  = S.vel.y.toFixed(1);
  $hsv.textContent  = hs.toFixed(1);
  $altV.textContent = alt.toFixed(0);
  $altV.style.color = alt > 120 ? '#f87171' : alt > 100 ? '#fbbf24' : '#fff';

  $bat.textContent = batPct + '%';
  $bat.style.color = batPct < 15 ? '#f87171' : batPct < 30 ? '#fbbf24' : '#fff';

  // Artificial horizon
  const rollDeg = S.vRoll * (180 / Math.PI);
  const pitchPx = S.vPitch * 55; // positive = nose down → horizon up
  ahiW.setAttribute('transform', `rotate(${rollDeg.toFixed(2)}) translate(0,${(-pitchPx).toFixed(1)})`);

  // Roll indicator dot on arc
  const rollRad = S.vRoll;
  const arcR = 38;
  rollInd.setAttribute('cx', (Math.sin(rollRad) * arcR).toFixed(2));
  rollInd.setAttribute('cy', (-Math.cos(rollRad) * arcR).toFixed(2));

  // Compass
  const yawDeg = ((S.yaw * (180 / Math.PI)) % 360 + 360) % 360;
  cmpDisc.setAttribute('transform', `rotate(${(-yawDeg).toFixed(1)})`);
  $hdgT.textContent = Math.round(yawDeg).toString().padStart(3,'0') + '°';

  // VSI bar
  const vFrac = THREE.MathUtils.clamp(S.vel.y / P.maxVV, -1, 1);
  if (vFrac >= 0) {
    vsiBar.style.bottom = '50%';
    vsiBar.style.top = 'auto';
    vsiBar.style.height = (vFrac * 31) + 'px';
    vsiBar.style.background = '#4ade80';
  } else {
    vsiBar.style.top = '50%';
    vsiBar.style.bottom = 'auto';
    vsiBar.style.height = (-vFrac * 31) + 'px';
    vsiBar.style.background = '#fb923c';
  }

  // Warnings
  const ws = [];
  if (batPct <= 0)         ws.push('<div class="wb wr">🔴 電量耗盡 — 緊急降落</div>');
  else if (batPct <= 15)   ws.push('<div class="wb wr">⚡ 電量嚴重不足 — 強制返航</div>');
  else if (batPct <= 30)   ws.push('<div class="wb wy">⚡ 低電量警告 (' + batPct + '%)</div>');
  if (alt > 120)           ws.push('<div class="wb wr">🚫 超過法定高度上限 120m</div>');
  else if (alt > 100)      ws.push('<div class="wb wy">⚠️ 接近高度上限 120m</div>');
  if (S.rth && batPct > 15) ws.push('<div class="wb wy">🏠 自動返航中</div>');
  $warns.innerHTML = ws.join('');
}

// ════════════════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════════════════
let lastT = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  applyKeyInput(dt);
  updatePhysics(dt);
  updateBattery(dt);
  updateDroneVisual(dt);
  updateCameras(dt);
  updateHUD(now);

  renderer.render(scene, getActiveCamera());
}

// Start
requestAnimationFrame(animate);

// Expose view setter for buttons
window.setView = setView;
</script>
</body>
</html>
